name: JRMS News Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: 

jobs:
  check-site:
    runs-on: ubuntu-latest
    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4

    - name: Run Scraper Script
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python - << 'EOF'
        import os
        import requests
        import hashlib
        from bs4 import BeautifulSoup

        URL = "https://jrms.jaf.mil.jo/News.aspx"
        headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}

        # We use your unique Telegram Chat ID to create a private, free cloud storage bucket line
        chat_id = os.environ['TELEGRAM_CHAT_ID']
        token = os.environ['TELEGRAM_TOKEN']
        kvdb_url = f"https://kvdb.io/8xYnBfMv8vE6f89J7pW9mD/{chat_id}_jrms_state"

        try:
            # 1. Fetch the JRMS news page
            response = requests.get(URL, headers=headers, timeout=15)
            soup = BeautifulSoup(response.text, 'html.parser')
            
            # Clean text to compare content changes
            current_text = soup.get_text().strip()
            # We turn the text into a short unique fingerprint (hash) to save cloud space
            current_hash = hashlib.md5(current_text.encode('utf-8')).hexdigest()

            # 2. Get the previous fingerprint from the cloud database
            old_hash = ""
            kv_response = requests.get(kvdb_url)
            if kv_response.status_code == 200:
                old_hash = kv_response.text.strip()

            # 3. If it's a brand new baseline setup, just save it first
            if not old_hash:
                print("First run: Creating baseline snapshot in the cloud.")
                requests.put(kvdb_url, data=current_hash)
            
            # 4. If the page actually changed, ping Telegram!
            elif current_hash != old_hash:
                print("Change detected! Sending Telegram alert.")
                message = f"🚨 JRMS News Update Detected!\nCheck the page: {URL}"
                tg_url = f"https://api.telegram.org/bot{token}/sendMessage"
                
                # Send message
                requests.post(tg_url, data={"chat_id": chat_id, "text": message})
                
                # Save the new state so it doesn't alert again until the next update
                requests.put(kvdb_url, data=current_hash)
            else:
                print("No changes detected. Webpage matches last snapshot.")

        except Exception as e:
            print(f"Error executing scrape: {e}")
        EOF
