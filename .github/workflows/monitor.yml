name: JRMS News Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: 

# This explicitly grants write access just in case
permissions:
  contents: write

jobs:
  check-site:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Fixed the typo here

    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4

    - name: Run Scraper Script
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python - << 'EOF'
        import os
        import requests
        from bs4 import BeautifulSoup

        URL = "https://jrms.jaf.mil.jo/News.aspx"
        headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}

        try:
            response = requests.get(URL, headers=headers, timeout=15)
            soup = BeautifulSoup(response.text, 'html.parser')
            
            # Grabbing text to track changes
            current_text = soup.get_text()

            history_file = "last_site_state.txt"
            old_text = ""
            if os.path.exists(history_file):
                with open(history_file, "r", encoding="utf-8") as f:
                    old_text = f.read()

            if old_text and current_text != old_text:
                message = f"🚨 JRMS News Update Detected!\nCheck the page: {URL}"
                token = os.environ['TELEGRAM_TOKEN']
                chat_id = os.environ['TELEGRAM_CHAT_ID']
                tg_url = f"https://api.telegram.org/bot{token}/sendMessage"
                requests.post(tg_url, data={"chat_id": chat_id, "text": message})

            with open(history_file, "w", encoding="utf-8") as f:
                f.write(current_text)

        except Exception as e:
            print(f"Error executing scrape: {e}")
        EOF

    - name: Commit and save structural changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add last_site_state.txt
        git commit -m "Update last known webpage snapshot [skip ci]" || exit 0
        git push
